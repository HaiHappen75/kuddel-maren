<!DOCTYPE html>
<html lang="de">

  <!-- Open Graph (hübsche Vorschau beim Teilen via WhatsApp etc.) -->

<body>
  <!-- animierter Synthwave-Hintergrund (rein per CSS) -->
  <div class="scene" aria-hidden="true">

      <span class="hero__name">Kuddel</span>
      <span class="hero__amp">&amp;</span>

    <ul class="hero__occasions">
      <li><span class="badge badge--pink">🎉 Kuddel wird 50</span></li>
      <li><span class="badge badge--cyan">💍 16. Hochzeitstag</span></li>

    </ul>
    <p class="hero__cta">Such dir was Schönes aus der Bar 👇</p>
  </header>

  <nav class="catnav" id="catnav" aria-label="Getränkekategorien">
    <div class="catnav__track" id="catnav-track"><!-- Chips per JS --></div>
  </nav>

  <main id="menu"><!-- Kategorien per JS --></main>

  <footer class="footer">
    <p>🥂 Prost auf Kuddel &amp; Maren — bitte trinkt verantwortungsvoll.</p>
