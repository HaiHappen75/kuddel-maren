server {
    listen       80;
    listen       [::]:80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Komprimierung
    gzip              on;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types        text/plain text/css application/javascript image/svg+xml application/json;

    # HTML nie aggressiv cachen (Inhalt kann sich ändern)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Statische Assets lange cachen
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
